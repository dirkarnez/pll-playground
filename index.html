  bufferArray[i] = Math.sin((2 * Math.PI * frequency * i) / sampleRate);

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <script type="module">
    import { default as bufferToWav } from "./to-wav-file.js";
    var wav = bufferToWav(new AudioBuffer());
    var blob = new window.Blob([ new DataView(wav) ], {
      type: 'audio/wav'
    });


    var url = window.URL.createObjectURL(blob)
    anchor.href = url
    anchor.download = 'audio.wav'
    anchor.click();
    setTimeout(() => {
      window.URL.revokeObjectURL(url);
    }, 0);
  </script>
</body>
